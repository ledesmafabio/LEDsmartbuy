<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - SuperMercado App</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --bg: #0a0f0d;
      --card: #141f1a;
      --border: #2a3d32;
      --fg: #e8f5e9;
      --muted: #7a9985;
      --accent: #00e676;
      --accent-dark: #00c853;
      --danger: #ff5252;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .bg-pattern {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(0,230,118,0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(0,200,83,0.06) 0%, transparent 50%);
    }
    .floating-circle {
      position: fixed; border-radius: 50%;
      background: rgba(0,230,118,0.03);
      border: 1px solid rgba(0,230,118,0.08);
      animation: floatC 20s ease-in-out infinite;
    }
    @keyframes floatC {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-30px); }
    }
    .login-container {
      position: relative; z-index: 10;
      width: 100%; max-width: 420px; padding: 1rem;
    }
    .login-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem 2rem;
      box-shadow: 0 25px 50px rgba(0,0,0,0.4), 0 0 80px rgba(0,230,118,0.05);
    }
    .logo-section { text-align: center; margin-bottom: 2rem; }
    .logo-icon {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      border-radius: 16px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 28px; color: var(--bg);
      margin-bottom: 1rem;
      box-shadow: 0 8px 24px rgba(0,230,118,0.3);
    }
    .logo-title { font-size: 1.6rem; font-weight: 900; }
    .logo-subtitle { font-size: 0.85rem; color: var(--muted); margin-top: 0.25rem; }

    /* Tabs */
    .tabs {
      display: flex; background: var(--bg);
      border-radius: 12px; padding: 4px; margin-bottom: 1.5rem;
    }
    .tab-btn {
      flex: 1; padding: 0.6rem; border: none; background: transparent;
      color: var(--muted); font-family: 'Poppins', sans-serif;
      font-size: 0.85rem; font-weight: 600; border-radius: 10px;
      cursor: pointer; transition: all 0.3s;
    }
    .tab-btn.active {
      background: var(--accent); color: var(--bg);
      box-shadow: 0 4px 12px rgba(0,230,118,0.3);
    }

    /* Inputs */
    .form-group { margin-bottom: 1rem; }
    .form-group label {
      display: block; font-size: 0.8rem; font-weight: 600;
      color: var(--muted); margin-bottom: 0.4rem;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .input-wrapper { position: relative; }
    .input-wrapper > i {
      position: absolute; left: 14px; top: 50%;
      transform: translateY(-50%); color: var(--muted); font-size: 0.9rem;
      transition: color 0.3s;
    }
    .form-input {
      width: 100%; padding: 0.75rem 2.75rem;
      background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 12px; color: var(--fg);
      font-family: 'Poppins', sans-serif; font-size: 0.9rem;
      transition: all 0.3s; outline: none;
    }
    .form-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,230,118,0.15);
    }
    .form-input:focus ~ i { color: var(--accent); }
    .toggle-pw {
      position: absolute; right: 14px; top: 50%;
      transform: translateY(-50%); background: none; border: none;
      color: var(--muted); cursor: pointer; font-size: 0.9rem;
    }
    .toggle-pw:hover { color: var(--accent); }

    /* Botones */
    .btn-primary {
      width: 100%; padding: 0.85rem;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      border: none; border-radius: 12px; color: var(--bg);
      font-family: 'Poppins', sans-serif; font-size: 0.95rem;
      font-weight: 700; cursor: pointer; transition: all 0.3s;
      display: flex; align-items: center; justify-content: center;
      gap: 0.5rem; margin-top: 0.5rem;
    }
    .btn-primary:hover { box-shadow: 0 8px 24px rgba(0,230,118,0.35); transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .spinner {
      width: 20px; height: 20px;
      border: 2.5px solid rgba(0,0,0,0.2);
      border-top-color: var(--bg); border-radius: 50%;
      animation: spin 0.6s linear infinite; display: none;
    }
    .btn-primary.loading .spinner { display: block; }
    .btn-primary.loading .btn-text { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .divider {
      display: flex; align-items: center;
      margin: 1.5rem 0; gap: 1rem;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }
    .divider span { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

    .btn-google {
      width: 100%; padding: 0.8rem; background: var(--bg);
      border: 1.5px solid var(--border); border-radius: 12px;
      color: var(--fg); font-family: 'Poppins', sans-serif;
      font-size: 0.9rem; font-weight: 600; cursor: pointer;
      transition: all 0.3s; display: flex; align-items: center;
      justify-content: center; gap: 0.75rem;
    }
    .btn-google:hover { border-color: var(--accent); background: rgba(0,230,118,0.05); }
    .btn-google img { width: 20px; height: 20px; }

    .error-msg {
      background: rgba(255,82,82,0.1); border: 1px solid rgba(255,82,82,0.3);
      color: var(--danger); padding: 0.7rem 1rem; border-radius: 10px;
      font-size: 0.8rem; margin-bottom: 1rem;
      display: none; align-items: center; gap: 0.5rem;
      animation: shake 0.4s ease;
    }
    .error-msg.visible { display: flex; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }

    .form-panel { display: none; }
    .form-panel.active { display: block; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .login-card { padding: 2rem 1.5rem; }
    }
  </style>
</head>
<body>

  <div class="bg-pattern"></div>
  <div class="floating-circle" style="width:300px;height:300px;top:-100px;left:-100px;"></div>
  <div class="floating-circle" style="width:200px;height:200px;bottom:-50px;right:-50px;animation-delay:-7s;"></div>

  <div class="login-container">
    <div class="login-card">

      <div class="logo-section">
        <div class="logo-icon"><i class="fas fa-shopping-cart"></i></div>
        <h1 class="logo-title">SuperMercado</h1>
        <p class="logo-subtitle">Organiza tus compras de forma inteligente</p>
      </div>

      <div class="error-msg" id="errorMsg">
        <i class="fas fa-exclamation-circle"></i>
        <span id="errorText"></span>
      </div>

      <div class="tabs">
        <button class="tab-btn active" id="tabLogin">Ingresar</button>
        <button class="tab-btn" id="tabRegistro">Registrarse</button>
      </div>

      <!-- LOGIN -->
      <form class="form-panel active" id="formLogin">
        <div class="form-group">
          <label>Email</label>
          <div class="input-wrapper">
            <input type="email" id="loginEmail" class="form-input" placeholder="tu@email.com" required>
            <i class="fas fa-envelope"></i>
          </div>
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <div class="input-wrapper">
            <input type="password" id="loginPassword" class="form-input" placeholder="Tu contraseña" required>
            <i class="fas fa-lock"></i>
            <button type="button" class="toggle-pw" data-target="loginPassword"><i class="fas fa-eye"></i></button>
          </div>
        </div>
        <button type="submit" class="btn-primary" id="btnLogin">
          <span class="btn-text">Iniciar sesión</span>
          <div class="spinner"></div>
        </button>
      </form>

      <!-- REGISTRO -->
      <form class="form-panel" id="formRegistro">
        <div class="form-group">
          <label>Nombre</label>
          <div class="input-wrapper">
            <input type="text" id="regNombre" class="form-input" placeholder="Tu nombre" required>
            <i class="fas fa-user"></i>
          </div>
        </div>
        <div class="form-group">
          <label>Email</label>
          <div class="input-wrapper">
            <input type="email" id="regEmail" class="form-input" placeholder="tu@email.com" required>
            <i class="fas fa-envelope"></i>
          </div>
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <div class="input-wrapper">
            <input type="password" id="regPassword" class="form-input" placeholder="Mínimo 6 caracteres" required minlength="6">
            <i class="fas fa-lock"></i>
            <button type="button" class="toggle-pw" data-target="regPassword"><i class="fas fa-eye"></i></button>
          </div>
        </div>
        <button type="submit" class="btn-primary" id="btnRegistro">
          <span class="btn-text">Crear cuenta</span>
          <div class="spinner"></div>
        </button>
      </form>

      <div class="divider"><span>o continuar con</span></div>

      <button class="btn-google" id="btnGoogle">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
        Continuar con Google
      </button>

    </div>
  </div>

  <!-- ============================================ -->
  <!-- FIRESTORE + AUTH: Todo en un solo bloque     -->
  <!-- ============================================ -->
  <script type="module">
    // ---- 1. INICIALIZAR FIREBASE (acá van tus datos reales) ----
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
    import { getFirestore } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";
    import { getAuth, GoogleAuthProvider, createUserWithEmailAndPassword, signInWithEmailAndPassword, signInWithPopup, onAuthStateChanged }
      from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";

      const firebaseConfig = {
      apiKey: "AIzaSyB478amvmfV36ZCQ-iE7f8SpcX_RByBsGo",
      authDomain: "ledsmartbuy.firebaseapp.com",
      projectId: "ledsmartbuy",
      storageBucket: "ledsmartbuy.firebasestorage.app",
      messagingSenderId: "1001221324085",
      appId: "1:1001221324085:web:8501c9d2bebfeec8c7a07c"};

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const googleProvider = new GoogleAuthProvider();

    // ---- 2. ELEMENTOS DEL DOM ----
    const tabLogin = document.getElementById('tabLogin');
    const tabRegistro = document.getElementById('tabRegistro');
    const formLogin = document.getElementById('formLogin');
    const formRegistro = document.getElementById('formRegistro');
    const errorMsg = document.getElementById('errorMsg');
    const errorText = document.getElementById('errorText');
    const btnLogin = document.getElementById('btnLogin');
    const btnRegistro = document.getElementById('btnRegistro');
    const btnGoogle = document.getElementById('btnGoogle');

    // ---- 3. UTILIDADES ----
    function traducirError(code) {
      const e = {
        'auth/user-not-found': 'No existe una cuenta con ese email',
        'auth/wrong-password': 'Contraseña incorrecta',
        'auth/email-already-in-use': 'Ya existe una cuenta con ese email',
        'auth/weak-password': 'La contraseña debe tener al menos 6 caracteres',
        'auth/invalid-email': 'Email no válido',
        'auth/too-many-requests': 'Demasiados intentos. Intentá más tarde',
        'auth/popup-closed-by-user': 'Se cerró la ventana de login',
        'auth/invalid-credential': 'Email o contraseña incorrectos',
        'auth/network-request-failed': 'Error de conexión'
      };
      return e[code] || 'Error: ' + code;
    }

    function mostrarError(msg) {
      errorText.textContent = msg;
      errorMsg.classList.add('visible');
      setTimeout(() => errorMsg.classList.remove('visible'), 5000);
    }

    function setLoading(btn, estado) {
      btn.classList.toggle('loading', estado);
      btn.disabled = estado;
    }

    // ---- 4. TABS ----
    tabLogin.addEventListener('click', () => {
      tabLogin.classList.add('active');
      tabRegistro.classList.remove('active');
      formLogin.classList.add('active');
      formRegistro.classList.remove('active');
      errorMsg.classList.remove('visible');
    });
    tabRegistro.addEventListener('click', () => {
      tabRegistro.classList.add('active');
      tabLogin.classList.remove('active');
      formRegistro.classList.add('active');
      formLogin.classList.remove('active');
      errorMsg.classList.remove('visible');
    });

    // ---- 5. MOSTRAR/OCULTAR CONTRASEÑA ----
    document.querySelectorAll('.toggle-pw').forEach(btn => {
      btn.addEventListener('click', () => {
        const input = document.getElementById(btn.dataset.target);
        const icon = btn.querySelector('i');
        if (input.type === 'password') {
          input.type = 'text';
          icon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
          input.type = 'password';
          icon.classList.replace('fa-eye-slash', 'fa-eye');
        }
      });
    });

    // ---- 6. GUARDAR DATOS DEL USUARIO EN FIRESTORE ----
    async function guardarDatosUsuario(uid, nombre, email) {
      try {
        // Importación dinámica de las funciones de Firestore que necesitamos
        const { doc, setDoc } = await import("https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js");
        await setDoc(doc(db, "usuarios", uid), {
          nombre: nombre,
          email: email,
          fechaCreacion: new Date().toISOString(),
          listaCompras: []
        });
      } catch (e) {
        console.error('Error guardando usuario en Firestore:', e);
      }
    }

    // ---- 7. LOGIN CON EMAIL ----
    formLogin.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.classList.remove('visible');
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;

      setLoading(btnLogin, true);
      try {
        await signInWithEmailAndPassword(auth, email, password);
        // onAuthStateChanged de abajo se encarga de redirigir
      } catch (error) {
        mostrarError(traducirError(error.code));
      } finally {
        setLoading(btnLogin, false);
      }
    });

    // ---- 8. REGISTRO CON EMAIL ----
    formRegistro.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.classList.remove('visible');
      const nombre = document.getElementById('regNombre').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPassword').value;

      if (nombre.length < 2) { mostrarError('Ingresá tu nombre'); return; }

      setLoading(btnRegistro, true);
      try {
        const cred = await createUserWithEmailAndPassword(auth, email, password);
        await guardarDatosUsuario(cred.user.uid, nombre, email);
      } catch (error) {
        mostrarError(traducirError(error.code));
      } finally {
        setLoading(btnRegistro, false);
      }
    });

    // ---- 9. LOGIN CON GOOGLE ----
    btnGoogle.addEventListener('click', async () => {
      errorMsg.classList.remove('visible');
      try {
        const result = await signInWithPopup(auth, googleProvider);
        // Si es usuario nuevo, guardar sus datos
        const { doc, getDoc } = await import("https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js");
        const userDoc = await getDoc(doc(db, "usuarios", result.user.uid));
        if (!userDoc.exists()) {
          await guardarDatosUsuario(
            result.user.uid,
            result.user.displayName || 'Usuario',
            result.user.email
          );
        }
      } catch (error) {
        if (error.code !== 'auth/popup-closed-by-user') {
          mostrarError(traducirError(error.code));
        }
      }
    });

    // ---- 10. REDIRECCIÓN AUTOMÁTICA ----
    // Si el usuario ya está logueado, lo manda directo al index
    onAuthStateChanged(auth, (user) => {
      if (user) {
        // Redirige a tu app principal
        // Si está en un subdirectorio: './mi-app/index.html'
        window.location.href = './index.html';
      }
    });
  </script>

</body>
</html>
